<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>今天吃啥 - 外卖选择困难症终结者</title>
<meta name="description" content="160+外卖品类和品牌，帮你秒选今天吃什么！">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","WenQuanYi Micro Hei",system-ui,sans-serif;
  background:#ecedf0;color:#333;line-height:1.6;overflow-x:hidden;
  padding-bottom:calc(60px + env(safe-area-inset-bottom,0px));
}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative;box-shadow:0 0 60px rgba(0,0,0,.06)}

/* ===== Header ===== */
.header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,#ff6b35 0%,#ff4757 50%,#ff6348 100%);
  padding:16px 20px 14px;color:#fff;
}
.header h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:6px}
.header .sub{font-size:11px;opacity:.8;margin-top:1px}

/* ===== Random ===== */
.random-wrap{padding:14px 20px 6px}
.random-btn{
  width:100%;padding:13px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#ff6b35,#ff4757);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;box-shadow:0 4px 16px rgba(255,71,87,.28);
}
.random-btn:active{transform:scale(.97)}
.random-btn .dice{font-size:20px}
.random-note{text-align:center;font-size:11px;color:#bbb;margin-top:4px}

/* ===== Content ===== */
.content{padding:12px 20px 24px}
.section{margin-bottom:18px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:14px;font-weight:600;color:#555;display:flex;align-items:center;gap:5px}
.section-title .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.clear-btn{font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 6px;border-radius:6px}
.clear-btn:active{background:#f5f5f5}

/* ===== Category Grid (美团 style) ===== */
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cat-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 2px 8px;border-radius:12px;background:#f7f8fa;
  cursor:pointer;transition:all .22s;user-select:none;border:1.5px solid transparent;
}
.cat-item:active{transform:scale(.93)}
.cat-item .cat-emoji{font-size:24px;margin-bottom:3px;transition:transform .2s}
.cat-item .cat-text{font-size:11px;color:#666;font-weight:500;white-space:nowrap}
.cat-item.active{background:#fff2ed;border-color:#ff6b35}
.cat-item.active .cat-text{color:#ff6b35;font-weight:600}
.cat-item.active .cat-emoji{transform:scale(1.15)}

/* ===== Tags ===== */
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  padding:6px 14px;border-radius:18px;font-size:13px;cursor:pointer;
  transition:all .2s;user-select:none;border:1.5px solid transparent;
  display:inline-flex;align-items:center;gap:3px;
}
.tag:active{transform:scale(.94)}
.tag.flavor{background:#fff3e0;color:#e65100;border-color:#ffe0b2}
.tag.flavor.active{background:#e65100;color:#fff;border-color:#e65100;box-shadow:0 2px 8px rgba(230,81,0,.2)}
.tag.price{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
.tag.price.active{background:#2e7d32;color:#fff;border-color:#2e7d32;box-shadow:0 2px 8px rgba(46,125,50,.2)}
.tag.active::before{content:'✓ ';font-size:10px;font-weight:700}

/* ===== Divider ===== */
.divider{height:6px;background:#f0f1f3;margin:4px -20px 0}

/* ===== Results ===== */
.results-section{padding-top:14px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.results-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:5px}
.results-count{font-size:11px;color:#999;background:#f5f6f8;padding:2px 10px;border-radius:10px}

.search-wrap{margin-bottom:12px;position:relative}
.search-input{
  width:100%;padding:9px 14px 9px 34px;
  border:1.5px solid #e8e8e8;border-radius:11px;
  font-size:13px;font-family:inherit;background:#fafafa;color:#333;
  transition:border-color .2s;outline:none;
}
.search-input:focus{border-color:#ff6b35;background:#fff}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:#bbb}

/* ===== Dish Grid ===== */
.dish-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dish-card{
  background:#fafbfc;border:1px solid #f0f1f3;border-radius:13px;
  padding:11px;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both;
}
.dish-card:hover{border-color:#e0e0e0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dish-card:active{transform:scale(.97)}
.dish-card.brand-card{background:linear-gradient(135deg,#fffbf5,#fff8f0);border-color:#ffe8d6}
.dish-card .d-name{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.35;color:#333;display:flex;align-items:center;gap:4px}
.dish-card .brand-badge{
  font-size:9px;background:linear-gradient(135deg,#ffd700,#ffb300);color:#7c4a00;
  padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap;flex-shrink:0;
}
.dish-card .d-desc{font-size:11px;color:#999;margin-bottom:6px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dish-card .d-bottom{display:flex;align-items:center;justify-content:space-between}
.dish-card .d-price{font-size:12px;color:#ff6b35;font-weight:600}
.dish-card .d-extra{display:flex;align-items:center;gap:4px}
.dish-card .d-cat{font-size:9px;padding:2px 6px;border-radius:5px;background:#f0f1f3;color:#888}
.dish-card .d-spicy{font-size:10px}

.empty{text-align:center;padding:44px 20px;color:#bbb;grid-column:1/-1}
.empty .icon{font-size:48px;margin-bottom:10px;opacity:.6}
.empty p{font-size:13px;line-height:1.8}

/* ===== TabBar ===== */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:56px;
  background:#fff;border-top:1px solid #eee;
  display:flex;align-items:center;justify-content:space-around;
  z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;padding:5px 0;color:#bbb;
  transition:color .2s;border:none;background:transparent;font-family:inherit;
}
.tab-item:active{opacity:.7}
.tab-item.active{color:#ff6b35}
.tab-item svg{width:21px;height:21px;fill:currentColor}
.tab-item span{font-size:10px;font-weight:500}

/* ===== Detail Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;
  padding:20px 24px 34px;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-sheet h3{font-size:20px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.modal-info{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.modal-info .mi{font-size:12px;padding:4px 12px;border-radius:10px;font-weight:500}
.mi-cat{background:#e3f2fd;color:#1565c0}
.mi-price{background:#e8f5e9;color:#2e7d32}
.mi-spicy{background:#fbe9e7;color:#d84315}
.mi-brand{background:linear-gradient(135deg,#fff8e1,#fff3e0);color:#e65100;border:1px solid #ffe0b2}
.mi-flavor{background:#f3e5f5;color:#7b1fa2}
.modal-tip{
  background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:12px;
  padding:13px;font-size:13px;color:#e65100;line-height:1.7;
}
.modal-order{
  margin-top:14px;width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#ff6b35,#ff4757);color:#fff;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.modal-order:active{transform:scale(.97)}

/* ===== Spin Modal ===== */
.spin-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.spin-overlay.show{opacity:1;pointer-events:auto}
.spin-card{
  background:#fff;border-radius:24px;padding:30px 24px;text-align:center;
  width:calc(100% - 56px);max-width:360px;
  transform:scale(.8);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.spin-overlay.show .spin-card{transform:scale(1)}
.spin-card .s-emoji{font-size:52px;margin-bottom:10px;display:block}
.spin-card .s-label{font-size:12px;color:#999;margin-bottom:6px}
.spin-card .s-name{
  font-size:24px;font-weight:800;color:#333;
  min-height:36px;display:flex;align-items:center;justify-content:center;
  transition:color .3s;
}
.spin-card .s-name.final{color:#ff6b35}
.spin-card .s-info{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  margin-top:10px;min-height:22px;
}
.spin-card .s-info .si{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:500}
.si-price{background:#e8f5e9;color:#2e7d32}
.si-cat{background:#e3f2fd;color:#1565c0}
.si-brand{background:#fff3e0;color:#e65100}
.spin-card .s-desc{font-size:12px;color:#999;margin-top:8px;line-height:1.5;min-height:18px}
.spin-card .s-actions{margin-top:18px;display:flex;gap:10px}
.spin-card .s-actions button{
  flex:1;padding:11px;border:none;border-radius:12px;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;
}
.spin-card .s-actions button:active{transform:scale(.96)}
.btn-again{background:#f5f5f5;color:#666}
.btn-ok{background:linear-gradient(135deg,#ff6b35,#ff4757);color:#fff;box-shadow:0 3px 10px rgba(255,71,87,.2)}

.back-top{
  position:fixed;bottom:70px;right:calc(50% - 220px);
  width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid #eee;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.08);
  opacity:0;pointer-events:none;transition:all .3s;z-index:150;
}
.back-top.show{opacity:1;pointer-events:auto}
.back-top:active{transform:scale(.9)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@media(min-width:481px){body{background:#e4e5e8}}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <h1>🍽️ 今天吃啥</h1>
    <div class="sub">160+ 外卖品类 & 品牌，帮你秒选！</div>
  </div>

  <div class="random-wrap">
    <button class="random-btn" onclick="spinRandom()">
      <span class="dice">🎲</span> 选不了！帮我随机来一个
    </button>
    <div class="random-note">仅从主食中随机推荐，不含饮品甜品</div>
  </div>

  <div class="content">
    <!-- 品类 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="dot" style="background:#ff6b35"></span> 想吃什么</div>
        <button class="clear-btn" onclick="clearCat()">清除</button>
      </div>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- 口味 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="dot" style="background:#e65100"></span> 口味偏好</div>
        <button class="clear-btn" onclick="clearGroup('flavor')">清除</button>
      </div>
      <div class="tags" id="flavorTags"></div>
    </div>

    <!-- 预算 -->
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="dot" style="background:#2e7d32"></span> 人均预算</div>
        <button class="clear-btn" onclick="clearGroup('price')">清除</button>
      </div>
      <div class="tags" id="priceTags"></div>
    </div>

    <div class="divider"></div>

    <!-- 结果 -->
    <div class="section results-section">
      <div class="results-header">
        <h2>📋 为你推荐</h2>
        <span class="results-count" id="resultCount">0 个</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索品类或品牌名…" oninput="renderResults()">
      </div>
      <div class="dish-grid" id="dishGrid"></div>
    </div>
  </div>
</div>

<!-- TabBar -->
<div class="tabbar">
  <button class="tab-item active" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24"><path d="M8.1 13.34l2.83-2.83L3.91 3.5a2 2 0 000 2.82l4.19 4.19zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87a1 1 0 000 1.41 1 1 0 001.41 0L12 14.41l6.88 6.88a1 1 0 001.41 0 1 1 0 000-1.41L13.41 13l1.47-1.47z"/></svg>
    <span>点餐</span>
  </button>
  <button class="tab-item" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
    <span>收藏</span>
  </button>
  <button class="tab-item" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24"><path d="M12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19z"/></svg>
    <span>发现</span>
  </button>
  <button class="tab-item" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span>我的</span>
  </button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetail(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3 id="detailName"></h3>
    <div class="modal-info" id="detailInfo"></div>
    <div class="modal-tip" id="detailTip"></div>
    <button class="modal-order" onclick="closeDetail()">👆 打开美团/饿了么搜索下单</button>
  </div>
</div>

<!-- Spin Modal -->
<div class="spin-overlay" id="spinOverlay" onclick="closeSpin(event)">
  <div class="spin-card" onclick="event.stopPropagation()">
    <span class="s-emoji" id="spinEmoji">🤔</span>
    <div class="s-label" id="spinLabel">正在帮你选…</div>
    <div class="s-name" id="spinName">-</div>
    <div class="s-info" id="spinInfo"></div>
    <div class="s-desc" id="spinDesc"></div>
    <div class="s-actions" id="spinActions" style="display:none">
      <button class="btn-again" onclick="spinRandom()">🎲 再来</button>
      <button class="btn-ok" onclick="closeSpin()">就它了 👍</button>
    </div>
  </div>
</div>

<div class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</div>

["瑞可爷爷","甜品",0,"¥10-20",1,"甜","现烤芝士蛋糕",1],
["熊猫不走","甜品",0,"¥80-200",4,"甜","会跳舞的生日蛋糕",1],
["奈雪(烘焙)","甜品",0,"¥12-28",2,"甜","软欧包系列蛮不错",1],
];

const dishes = RAW.map(r => ({
  name:r[0], cat:r[1], spicy:r[2], priceRange:r[3], priceLevel:r[4],
  flavor:r[5], desc:r[6], brand:!!r[7]
}));

/* ==================== CATEGORIES ==================== */
const CATEGORIES = [
  {id:'快餐',emoji:'🍱',label:'快餐'},
  {id:'面食',emoji:'🍜',label:'面食'},
  {id:'粉面',emoji:'🍝',label:'粉面'},
  {id:'小吃',emoji:'🥟',label:'小吃'},
  {id:'烧烤',emoji:'🔥',label:'烧烤'},
  {id:'麻辣烫',emoji:'🌶',label:'麻辣烫'},
  {id:'火锅',emoji:'🫕',label:'火锅'},
  {id:'粥汤',emoji:'🥣',label:'粥汤'},
  {id:'菜馆',emoji:'🏮',label:'菜馆'},
  {id:'特色',emoji:'⭐',label:'特色'},
  {id:'西式快餐',emoji:'🍔',label:'西快'},
  {id:'日韩',emoji:'🍣',label:'日韩'},
  {id:'奶茶',emoji:'🧋',label:'奶茶'},
  {id:'咖啡',emoji:'☕',label:'咖啡'},
  {id:'甜品',emoji:'🍰',label:'甜品'},
];

const FLAVORS = ['不辣','微辣','中辣','特辣','酸辣','麻辣','酸甜','清淡','甜'];
const PRICES = ['≤15元','15-30元','30-50元','50元+'];
const MEAL_CATS = new Set(['快餐','面食','粉面','小吃','烧烤','麻辣烫','火锅','粥汤','菜馆','特色','西式快餐','日韩']);

/* ==================== STATE ==================== */
const selCat = new Set();
const selFlavor = new Set();
const selPrice = new Set();

/* ==================== RENDER CATEGORY GRID ==================== */
(function renderCatGrid(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATEGORIES.map(c =>
    `<div class="cat-item" data-id="${c.id}" onclick="toggleCat(this)">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-text">${c.label}</span>
    </div>`
  ).join('');
})();

function toggleCat(el){
  const id = el.dataset.id;
  if(selCat.has(id)){ selCat.delete(id); el.classList.remove('active'); }
  else{ selCat.add(id); el.classList.add('active'); }
  renderResults();
}
function clearCat(){
  selCat.clear();
  document.querySelectorAll('.cat-item').forEach(e=>e.classList.remove('active'));
  renderResults();
}

/* ==================== RENDER TAGS ==================== */
function renderTagGroup(containerId, items, group){
  document.getElementById(containerId).innerHTML = items.map(item =>
    `<span class="tag ${group}" data-val="${item}" data-group="${group}" onclick="toggleTag(this)">${item}</span>`
  ).join('');
}
renderTagGroup('flavorTags', FLAVORS, 'flavor');
renderTagGroup('priceTags', PRICES, 'price');

function toggleTag(el){
  const val=el.dataset.val, group=el.dataset.group;
  const set = group==='flavor'?selFlavor:selPrice;
  if(set.has(val)){ set.delete(val); el.classList.remove('active'); }
  else{ set.add(val); el.classList.add('active'); }
  renderResults();
}
function clearGroup(group){
  const set = group==='flavor'?selFlavor:selPrice;
  set.clear();
  document.querySelectorAll(`.tag.${group}`).forEach(t=>t.classList.remove('active'));
  renderResults();
}

/* ==================== MATCHING ==================== */
function matchDish(d){
  if(selCat.size>0 && !selCat.has(d.cat)) return false;

  if(selFlavor.size>0){
    let ok=false;
    if(selFlavor.has('不辣') && d.spicy===0) ok=true;
    if(selFlavor.has('微辣') && d.spicy===1) ok=true;
    if(selFlavor.has('中辣') && d.spicy===2) ok=true;
    if(selFlavor.has('特辣') && d.spicy>=3) ok=true;
    for(const f of selFlavor){
      if(['酸辣','麻辣','酸甜','清淡','甜'].includes(f) && d.flavor===f) ok=true;
    }
    if(!ok) return false;
  }

  if(selPrice.size>0){
    let ok=false;
    if(selPrice.has('≤15元') && d.priceLevel===1) ok=true;
    if(selPrice.has('15-30元') && d.priceLevel===2) ok=true;
    if(selPrice.has('30-50元') && d.priceLevel===3) ok=true;
    if(selPrice.has('50元+') && d.priceLevel>=4) ok=true;
    if(!ok) return false;
  }
  return true;
}

function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return dishes.filter(d => {
    if(q && !d.name.toLowerCase().includes(q) && !d.desc.toLowerCase().includes(q)) return false;
    return matchDish(d);
  });
}

/* ==================== RENDER ==================== */
function spicyIcons(s){ return s>0?'🌶'.repeat(Math.min(s,3)):'' }
const catEmojiMap = {};
CATEGORIES.forEach(c => catEmojiMap[c.id]=c.emoji);

function renderResults(){
  const grid = document.getElementById('dishGrid');
  const countEl = document.getElementById('resultCount');
  const results = getFiltered();
  countEl.textContent = results.length + ' 个';

  if(results.length===0){
    grid.innerHTML=`<div class="empty"><div class="icon">🤷</div><p>没有匹配结果<br/>试试减少筛选条件？</p></div>`;
    return;
  }

  grid.innerHTML = results.map((d,i) => `
    <div class="dish-card${d.brand?' brand-card':''}" style="animation-delay:${Math.min(i*.025,.5)}s" onclick="openDetail('${d.name.replace(/'/g,"\\'")}')">
      <div class="d-name">
        <span>${catEmojiMap[d.cat]||'🍽'} ${d.name}</span>
        ${d.brand?'<span class="brand-badge">品牌</span>':''}
      </div>
      <div class="d-desc">${d.desc}</div>
      <div class="d-bottom">
        <span class="d-price">${d.priceRange}/人</span>
        <div class="d-extra">
          ${spicyIcons(d.spicy)?`<span class="d-spicy">${spicyIcons(d.spicy)}</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

/* ==================== DETAIL ==================== */
function openDetail(name){
  const d=dishes.find(x=>x.name===name);
  if(!d) return;
  document.getElementById('detailName').textContent = (catEmojiMap[d.cat]||'🍽')+' '+d.name;
  document.getElementById('detailInfo').innerHTML = `
    <span class="mi mi-cat">${d.cat}</span>
    <span class="mi mi-price">${d.priceRange}/人</span>
    <span class="mi mi-flavor">${d.flavor}</span>
    ${d.brand?'<span class="mi mi-brand">🏪 品牌连锁</span>':''}
    ${d.spicy>0?`<span class="mi mi-spicy">${spicyIcons(d.spicy)} ${'微辣 中辣 特辣'.split(' ')[d.spicy-1]||'辣'}</span>`:''}
  `;
  document.getElementById('detailTip').textContent = '💡 '+d.desc;
  document.getElementById('detailModal').classList.add('show');
}
function closeDetail(e){
  if(!e||e.target.id==='detailModal') document.getElementById('detailModal').classList.remove('show');
}

/* ==================== RANDOM SPIN (仅主食) ==================== */
let spinTimer=null;
function spinRandom(){
  // 过滤掉饮品、咖啡、甜品
  let pool = getFiltered().filter(d => MEAL_CATS.has(d.cat));
  if(pool.length===0) pool = dishes.filter(d => MEAL_CATS.has(d.cat));
  if(pool.length===0) return;

  const overlay = document.getElementById('spinOverlay');
  const nameEl = document.getElementById('spinName');
  const infoEl = document.getElementById('spinInfo');
  const emojiEl = document.getElementById('spinEmoji');
  const labelEl = document.getElementById('spinLabel');
  const descEl = document.getElementById('spinDesc');
  const actionsEl = document.getElementById('spinActions');

  overlay.classList.add('show');
  actionsEl.style.display='none';
  nameEl.classList.remove('final');
  labelEl.textContent='正在帮你选…';
  emojiEl.textContent='🤔';
  emojiEl.style.animation='spin 0.5s linear infinite';
  descEl.textContent='';

  const target = pool[Math.floor(Math.random()*pool.length)];
  let count=0, total=22;
  if(spinTimer) clearInterval(spinTimer);
  spinTimer = setInterval(()=>{
    const rd = pool[Math.floor(Math.random()*pool.length)];
    nameEl.textContent = rd.name;
    infoEl.innerHTML = `<span class="si si-cat">${rd.cat}</span><span class="si si-price">${rd.priceRange}</span>`;
    count++;
    if(count>=total){
      clearInterval(spinTimer); spinTimer=null;
      nameEl.textContent = target.name;
      nameEl.classList.add('final');
      infoEl.innerHTML = `
        <span class="si si-cat">${catEmojiMap[target.cat]||''} ${target.cat}</span>
        <span class="si si-price">${target.priceRange}/人</span>
        ${target.brand?'<span class="si si-brand">🏪 品牌</span>':''}
        ${target.spicy>0?`<span class="si" style="background:#fbe9e7;color:#d84315">${spicyIcons(target.spicy)}</span>`:''}
      `;
      descEl.textContent = target.desc;
      emojiEl.textContent='🎉';
      emojiEl.style.animation='bounce 0.5s ease';
      labelEl.textContent='就决定是你了！';
      actionsEl.style.display='flex';
    }
  },75);
}
function closeSpin(e){
  if(!e||e.target.id==='spinOverlay'){
    document.getElementById('spinOverlay').classList.remove('show');
    if(spinTimer){clearInterval(spinTimer);spinTimer=null;}
  }
}

/* ==================== TAB ==================== */
function switchTab(el){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

/* ==================== SCROLL ==================== */
window.addEventListener('scroll',()=>{
  document.getElementById('backTop').classList.toggle('show',window.scrollY>400);
});

/* ==================== INIT ==================== */
renderResults();
</script>
</body>
</html>
